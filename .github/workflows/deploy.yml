name: CI/CD Flask Demo

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t jordan0705/flask-demo:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image to Docker Hub
        run: docker push jordan0705/flask-demo:latest

      - name: Deploy container
        run: |
          docker stop flask-demo || true
          docker rm flask-demo || true
          docker run -d --name flask-demo -p 5000:5000 jordan0705/flask-demo:latest
